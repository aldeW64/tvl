# OAT-style training configuration.
#
# Incorporates insights from Ordered Action Tokenization (OAT):
#   - Role embeddings for alignment-leading versus suffix registers
#   - Contrastive alignment with mandatory flow reconstruction
#   - Per-sample uniform nested dropout
#
# This config uses paired nested dropout and flow reconstruction.
#
# Reference: https://ordered-action-tokenization.github.io/

model:
  hidden_dim: 512
  n_registers: 32
  n_shared: 8
  n_layers: 4
  n_heads: 8
  model_dropout: 0.1
  feature_mode: "sequence"
  nested_dropout: true
  nested_dropout_mode: "uniform"
  fsq_levels: "8 8 8 5 5 5"

loss:
  contrastive_weight: 1.0
  reconstruction_weight: 1.0

generation:
  codec_id: "EPFL-VILAB/flextok_vae_c4"
  flow_hidden_dim: 512
  flow_depth: 8
  flow_heads: 8

training:
  stage: "alignment"
  epochs: 100
  batch_size: 256
  blr: 3.0e-4
  warmup_epochs: 10
  seed: 42
