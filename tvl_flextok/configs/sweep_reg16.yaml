# Sweep: 16 register tokens (4 alignment-supervised leading registers)
model:
  hidden_dim: 512
  n_registers: 16
  n_shared: 4
  n_layers: 4
  n_heads: 8
  model_dropout: 0.1
  feature_mode: "sequence"
  nested_dropout: true
  nested_dropout_mode: "power_of_two"
  fsq_levels: "8 8 8 5 5 5"

loss:
  contrastive_weight: 1.0
  reconstruction_weight: 1.0

training:
  stage: "alignment"
  epochs: 100
  batch_size: 256
  blr: 3.0e-4
  warmup_epochs: 10
  seed: 42
